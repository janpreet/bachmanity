    <g class="terminal-173388753-matrix">
    <text class="terminal-173388753-r1" x="0" y="20" textLength="12.2" clip-path="url(#terminal-173388753-line-0)">&gt;</text><text class="terminal-173388753-r3" x="24.4" y="20" textLength="451.4" clip-path="url(#terminal-173388753-line-0)">gilfoyle&#160;mode.&#160;My&#160;deploy&#160;failed&#160;with&#160;</text><text class="terminal-173388753-r4" x="475.8" y="20" textLength="219.6" clip-path="url(#terminal-173388753-line-0)">&#x27;ImagePullBackOff&#x27;</text><text class="terminal-173388753-r3" x="695.4" y="20" textLength="427" clip-path="url(#terminal-173388753-line-0)">&#160;in&#160;kubernetes.&#160;What&#160;are&#160;the&#160;usual&#160;</text><text class="terminal-173388753-r2" x="1122.4" y="20" textLength="12.2" clip-path="url(#terminal-173388753-line-0)">
</text><text class="terminal-173388753-r3" x="0" y="44.4" textLength="268.4" clip-path="url(#terminal-173388753-line-1)">causes?&#160;Keep&#160;it&#160;short.</text><text class="terminal-173388753-r2" x="1122.4" y="44.4" textLength="12.2" clip-path="url(#terminal-173388753-line-1)">
</text><text class="terminal-173388753-r2" x="1122.4" y="68.8" textLength="12.2" clip-path="url(#terminal-173388753-line-2)">
</text><text class="terminal-173388753-r2" x="0" y="93.2" textLength="1122.4" clip-path="url(#terminal-173388753-line-3)">Fine.&#160;ImagePullBackOff.&#160;Not&#160;mysterious,&#160;just&#160;tedious.&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;</text><text class="terminal-173388753-r2" x="1122.4" y="93.2" textLength="12.2" clip-path="url(#terminal-173388753-line-3)">
</text><text class="terminal-173388753-r2" x="1122.4" y="117.6" textLength="12.2" clip-path="url(#terminal-173388753-line-4)">
</text><text class="terminal-173388753-r5" x="0" y="142" textLength="36.6" clip-path="url(#terminal-173388753-line-5)">&#160;•&#160;</text><text class="terminal-173388753-r5" x="36.6" y="142" textLength="146.4" clip-path="url(#terminal-173388753-line-5)">Bad&#160;tag/typo</text><text class="terminal-173388753-r2" x="183" y="142" textLength="939.4" clip-path="url(#terminal-173388753-line-5)">&#160;—&#160;image&#160;or&#160;tag&#160;doesn&#x27;t&#160;exist.&#160;The&#160;most&#160;common&#160;cause,&#160;because&#160;humans&#160;type&#160;&#160;&#160;&#160;</text><text class="terminal-173388753-r2" x="1122.4" y="142" textLength="12.2" clip-path="url(#terminal-173388753-line-5)">
</text><text class="terminal-173388753-r2" x="36.6" y="166.4" textLength="1085.8" clip-path="url(#terminal-173388753-line-6)">things.&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;</text><text class="terminal-173388753-r2" x="1122.4" y="166.4" textLength="12.2" clip-path="url(#terminal-173388753-line-6)">
</text><text class="terminal-173388753-r5" x="0" y="190.8" textLength="36.6" clip-path="url(#terminal-173388753-line-7)">&#160;•&#160;</text><text class="terminal-173388753-r5" x="36.6" y="190.8" textLength="451.4" clip-path="url(#terminal-173388753-line-7)">Private&#160;registry,&#160;no&#160;imagePullSecrets</text><text class="terminal-173388753-r2" x="488" y="190.8" textLength="634.4" clip-path="url(#terminal-173388753-line-7)">&#160;—&#160;kubelet&#160;asks&#160;for&#160;an&#160;image&#160;it&#160;isn&#x27;t&#160;authenticated&#160;</text><text class="terminal-173388753-r2" x="1122.4" y="190.8" textLength="12.2" clip-path="url(#terminal-173388753-line-7)">
</text><text class="terminal-173388753-r2" x="36.6" y="215.2" textLength="183" clip-path="url(#terminal-173388753-line-8)">to&#160;pull.&#160;Check&#160;</text><text class="terminal-173388753-r1" x="219.6" y="215.2" textLength="195.2" clip-path="url(#terminal-173388753-line-8)">imagePullSecrets</text><text class="terminal-173388753-r2" x="414.8" y="215.2" textLength="707.6" clip-path="url(#terminal-173388753-line-8)">&#160;on&#160;the&#160;pod/service&#160;account.&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;</text><text class="terminal-173388753-r2" x="1122.4" y="215.2" textLength="12.2" clip-path="url(#terminal-173388753-line-8)">
</text><text class="terminal-173388753-r5" x="0" y="239.6" textLength="36.6" clip-path="url(#terminal-173388753-line-9)">&#160;•&#160;</text><text class="terminal-173388753-r5" x="36.6" y="239.6" textLength="378.2" clip-path="url(#terminal-173388753-line-9)">Expired&#160;or&#160;wrong&#160;registry&#160;creds</text><text class="terminal-173388753-r2" x="414.8" y="239.6" textLength="707.6" clip-path="url(#terminal-173388753-line-9)">&#160;—&#160;the&#160;secret&#160;exists&#160;but&#160;the&#160;token&#160;rotted&#160;or&#160;was&#160;scoped&#160;&#160;&#160;</text><text class="terminal-173388753-r2" x="1122.4" y="239.6" textLength="12.2" clip-path="url(#terminal-173388753-line-9)">
</text><text class="terminal-173388753-r2" x="36.6" y="264" textLength="1085.8" clip-path="url(#terminal-173388753-line-10)">wrong.&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;</text><text class="terminal-173388753-r2" x="1122.4" y="264" textLength="12.2" clip-path="url(#terminal-173388753-line-10)">
</text><text class="terminal-173388753-r5" x="0" y="288.4" textLength="36.6" clip-path="url(#terminal-173388753-line-11)">&#160;•&#160;</text><text class="terminal-173388753-r5" x="36.6" y="288.4" textLength="439.2" clip-path="url(#terminal-173388753-line-11)">Wrong&#160;registry&#160;host&#160;or&#160;arch&#160;mismatch</text><text class="terminal-173388753-r2" x="475.8" y="288.4" textLength="646.6" clip-path="url(#terminal-173388753-line-11)">&#160;—&#160;pulling&#160;an&#160;amd64&#160;image&#160;onto&#160;an&#160;arm64&#160;node,&#160;or&#160;vice</text><text class="terminal-173388753-r2" x="1122.4" y="288.4" textLength="12.2" clip-path="url(#terminal-173388753-line-11)">
</text><text class="terminal-173388753-r2" x="36.6" y="312.8" textLength="1085.8" clip-path="url(#terminal-173388753-line-12)">versa.&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;</text><text class="terminal-173388753-r2" x="1122.4" y="312.8" textLength="12.2" clip-path="url(#terminal-173388753-line-12)">
</text><text class="terminal-173388753-r5" x="0" y="337.2" textLength="36.6" clip-path="url(#terminal-173388753-line-13)">&#160;•&#160;</text><text class="terminal-173388753-r5" x="36.6" y="337.2" textLength="158.6" clip-path="url(#terminal-173388753-line-13)">Rate&#160;limiting</text><text class="terminal-173388753-r2" x="195.2" y="337.2" textLength="927.2" clip-path="url(#terminal-173388753-line-13)">&#160;—&#160;Docker&#160;Hub&#160;anonymous&#160;pulls&#160;throttle&#160;you&#160;eventually.&#160;It&#x27;s&#160;not&#160;personal,&#160;&#160;&#160;</text><text class="terminal-173388753-r2" x="1122.4" y="337.2" textLength="12.2" clip-path="url(#terminal-173388753-line-13)">
</text><text class="terminal-173388753-r2" x="36.6" y="361.6" textLength="1085.8" clip-path="url(#terminal-173388753-line-14)">just&#160;capitalism.&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;</text><text class="terminal-173388753-r2" x="1122.4" y="361.6" textLength="12.2" clip-path="url(#terminal-173388753-line-14)">
</text><text class="terminal-173388753-r5" x="0" y="386" textLength="36.6" clip-path="url(#terminal-173388753-line-15)">&#160;•&#160;</text><text class="terminal-173388753-r5" x="36.6" y="386" textLength="353.8" clip-path="url(#terminal-173388753-line-15)">Node&#160;can&#x27;t&#160;reach&#160;the&#160;registry</text><text class="terminal-173388753-r2" x="390.4" y="386" textLength="732" clip-path="url(#terminal-173388753-line-15)">&#160;—&#160;network&#160;policy,&#160;proxy,&#160;or&#160;DNS&#160;blackholing&#160;egress.&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;</text><text class="terminal-173388753-r2" x="1122.4" y="386" textLength="12.2" clip-path="url(#terminal-173388753-line-15)">
</text><text class="terminal-173388753-r2" x="1122.4" y="410.4" textLength="12.2" clip-path="url(#terminal-173388753-line-16)">
</text><text class="terminal-173388753-r2" x="0" y="434.8" textLength="1122.4" clip-path="url(#terminal-173388753-line-17)">Fastest&#160;diagnosis:&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;</text><text class="terminal-173388753-r2" x="1122.4" y="434.8" textLength="12.2" clip-path="url(#terminal-173388753-line-17)">
</text><text class="terminal-173388753-r2" x="1122.4" y="459.2" textLength="12.2" clip-path="url(#terminal-173388753-line-18)">
</text><text class="terminal-173388753-r2" x="1122.4" y="483.6" textLength="12.2" clip-path="url(#terminal-173388753-line-19)">
</text><text class="terminal-173388753-r6" x="12.2" y="508" textLength="536.8" clip-path="url(#terminal-173388753-line-20)">kubectl&#160;describe&#160;pod&#160;&lt;pod&gt;&#160;|&#160;grep&#160;-A5&#160;Events</text><text class="terminal-173388753-r2" x="1122.4" y="508" textLength="12.2" clip-path="url(#terminal-173388753-line-20)">
</text><text class="terminal-173388753-r2" x="1122.4" y="532.4" textLength="12.2" clip-path="url(#terminal-173388753-line-21)">
</text><text class="terminal-173388753-r2" x="1122.4" y="556.8" textLength="12.2" clip-path="url(#terminal-173388753-line-22)">
</text><text class="terminal-173388753-r2" x="0" y="581.2" textLength="1122.4" clip-path="url(#terminal-173388753-line-23)">The&#160;event&#160;message&#160;tells&#160;you&#160;which&#160;of&#160;these&#160;it&#160;is.&#160;Read&#160;it&#160;before&#160;guessing.&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;</text><text class="terminal-173388753-r2" x="1122.4" y="581.2" textLength="12.2" clip-path="url(#terminal-173388753-line-23)">
