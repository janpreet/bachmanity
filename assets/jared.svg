</text><text class="terminal-1027595287-r2" x="1122.4" y="312.8" textLength="12.2" clip-path="url(#terminal-1027595287-line-12)">
</text><text class="terminal-1027595287-r2" x="0" y="337.2" textLength="793" clip-path="url(#terminal-1027595287-line-13)">A&#160;quick&#160;observation,&#160;since&#160;both&#160;failures&#160;live&#160;in&#160;the&#160;auth&#160;space:&#160;</text><text class="terminal-1027595287-r1" x="793" y="337.2" textLength="207.4" clip-path="url(#terminal-1027595287-line-13)">test_login_expiry</text><text class="terminal-1027595287-r2" x="1000.4" y="337.2" textLength="122" clip-path="url(#terminal-1027595287-line-13)">&#160;and&#160;&#160;&#160;&#160;&#160;&#160;</text><text class="terminal-1027595287-r2" x="1122.4" y="337.2" textLength="12.2" clip-path="url(#terminal-1027595287-line-13)">
</text><text class="terminal-1027595287-r1" x="0" y="361.6" textLength="219.6" clip-path="url(#terminal-1027595287-line-14)">test_refresh_token</text><text class="terminal-1027595287-r2" x="219.6" y="361.6" textLength="902.8" clip-path="url(#terminal-1027595287-line-14)">&#160;are&#160;suspiciously&#160;adjacent&#160;—&#160;expiry&#160;and&#160;refresh&#160;are&#160;usually&#160;two&#160;ends&#160;of&#160;&#160;&#160;</text><text class="terminal-1027595287-r2" x="1122.4" y="361.6" textLength="12.2" clip-path="url(#terminal-1027595287-line-14)">
</text><text class="terminal-1027595287-r2" x="0" y="386" textLength="1122.4" clip-path="url(#terminal-1027595287-line-15)">the&#160;same&#160;session-lifecycle&#160;logic,&#160;so&#160;there&#x27;s&#160;a&#160;decent&#160;chance&#160;they&#160;share&#160;one&#160;root&#160;cause&#160;&#160;&#160;&#160;&#160;&#160;</text><text class="terminal-1027595287-r2" x="1122.4" y="386" textLength="12.2" clip-path="url(#terminal-1027595287-line-15)">
</text><text class="terminal-1027595287-r2" x="0" y="410.4" textLength="1122.4" clip-path="url(#terminal-1027595287-line-16)">rather&#160;than&#160;being&#160;two&#160;separate&#160;fires.&#160;I&#x27;d&#160;suggest&#160;pulling&#160;the&#160;actual&#160;failure&#160;output&#160;for&#160;both</text><text class="terminal-1027595287-r2" x="1122.4" y="410.4" textLength="12.2" clip-path="url(#terminal-1027595287-line-16)">
</text><text class="terminal-1027595287-r2" x="0" y="434.8" textLength="1122.4" clip-path="url(#terminal-1027595287-line-17)">before&#160;touching&#160;any&#160;code,&#160;so&#160;we&#160;fix&#160;the&#160;cause&#160;once&#160;instead&#160;of&#160;twice.&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;</text><text class="terminal-1027595287-r2" x="1122.4" y="434.8" textLength="12.2" clip-path="url(#terminal-1027595287-line-17)">
</text><text class="terminal-1027595287-r2" x="1122.4" y="459.2" textLength="12.2" clip-path="url(#terminal-1027595287-line-18)">
</text><text class="terminal-1027595287-r2" x="0" y="483.6" textLength="1122.4" clip-path="url(#terminal-1027595287-line-19)">I&#160;won&#x27;t&#160;pretend&#160;I&#x27;ve&#160;run&#160;anything&#160;myself&#160;here&#160;—&#160;I&#160;only&#160;have&#160;the&#160;numbers&#160;you&#160;gave&#160;me&#160;—&#160;so&#160;I&#160;&#160;</text><text class="terminal-1027595287-r2" x="1122.4" y="483.6" textLength="12.2" clip-path="url(#terminal-1027595287-line-19)">
</text><text class="terminal-1027595287-r2" x="0" y="508" textLength="183" clip-path="url(#terminal-1027595287-line-20)">can&#x27;t&#160;tell&#160;you&#160;</text><text class="terminal-1027595287-r7" x="183" y="508" textLength="36.6" clip-path="url(#terminal-1027595287-line-20)">why</text><text class="terminal-1027595287-r2" x="219.6" y="508" textLength="280.6" clip-path="url(#terminal-1027595287-line-20)">&#160;they&#160;failed&#160;yet,&#160;only&#160;</text><text class="terminal-1027595287-r7" x="500.2" y="508" textLength="48.8" clip-path="url(#terminal-1027595287-line-20)">that</text><text class="terminal-1027595287-r2" x="549" y="508" textLength="573.4" clip-path="url(#terminal-1027595287-line-20)">&#160;they&#160;did.&#160;Say&#160;the&#160;word&#160;and&#160;I&#x27;ll&#160;help&#160;dig&#160;into&#160;</text><text class="terminal-1027595287-r2" x="1122.4" y="508" textLength="12.2" clip-path="url(#terminal-1027595287-line-20)">
