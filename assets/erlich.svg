    <g class="terminal-397674686-matrix">
    <text class="terminal-397674686-r1" x="0" y="20" textLength="12.2" clip-path="url(#terminal-397674686-line-0)">&gt;</text><text class="terminal-397674686-r3" x="24.4" y="20" textLength="585.6" clip-path="url(#terminal-397674686-line-0)">talk&#160;like&#160;erlich&#160;bachman.&#160;Then&#160;explain&#160;in&#160;about&#160;</text><text class="terminal-397674686-r4" x="610" y="20" textLength="12.2" clip-path="url(#terminal-397674686-line-0)">4</text><text class="terminal-397674686-r3" x="622.2" y="20" textLength="390.4" clip-path="url(#terminal-397674686-line-0)">&#160;sentences&#160;what&#160;git&#160;rebase&#160;does.</text><text class="terminal-397674686-r2" x="1122.4" y="20" textLength="12.2" clip-path="url(#terminal-397674686-line-0)">
</text><text class="terminal-397674686-r2" x="1122.4" y="44.4" textLength="12.2" clip-path="url(#terminal-397674686-line-1)">
</text><text class="terminal-397674686-r2" x="0" y="68.8" textLength="1122.4" clip-path="url(#terminal-397674686-line-2)">Alright,&#160;settle&#160;in,&#160;my&#160;boy&#160;—&#160;you&#x27;re&#160;about&#160;to&#160;get&#160;an&#160;explanation&#160;that&#160;Linus&#160;Torvalds&#160;himself&#160;</text><text class="terminal-397674686-r2" x="1122.4" y="68.8" textLength="12.2" clip-path="url(#terminal-397674686-line-2)">
</text><text class="terminal-397674686-r2" x="0" y="93.2" textLength="1122.4" clip-path="url(#terminal-397674686-line-3)">would&#x27;ve&#160;paid&#160;good&#160;money&#160;to&#160;hear&#160;back&#160;in&#160;the&#160;day,&#160;and&#160;I&#x27;m&#160;giving&#160;it&#160;to&#160;you&#160;for&#160;free,&#160;because</text><text class="terminal-397674686-r2" x="1122.4" y="93.2" textLength="12.2" clip-path="url(#terminal-397674686-line-3)">
</text><text class="terminal-397674686-r2" x="0" y="117.6" textLength="1122.4" clip-path="url(#terminal-397674686-line-4)">that&#x27;s&#160;the&#160;kind&#160;of&#160;magnanimous&#160;visionary&#160;I&#160;am.&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;</text><text class="terminal-397674686-r2" x="1122.4" y="117.6" textLength="12.2" clip-path="url(#terminal-397674686-line-4)">
</text><text class="terminal-397674686-r2" x="1122.4" y="142" textLength="12.2" clip-path="url(#terminal-397674686-line-5)">
</text><text class="terminal-397674686-r1" x="0" y="166.4" textLength="122" clip-path="url(#terminal-397674686-line-6)">git&#160;rebase</text><text class="terminal-397674686-r2" x="122" y="166.4" textLength="1000.4" clip-path="url(#terminal-397674686-line-6)">&#160;takes&#160;a&#160;sequence&#160;of&#160;commits&#160;and&#160;replays&#160;them,&#160;one&#160;by&#160;one,&#160;on&#160;top&#160;of&#160;a&#160;different&#160;&#160;</text><text class="terminal-397674686-r2" x="1122.4" y="166.4" textLength="12.2" clip-path="url(#terminal-397674686-line-6)">
</text><text class="terminal-397674686-r2" x="0" y="190.8" textLength="1122.4" clip-path="url(#terminal-397674686-line-7)">base&#160;commit&#160;—&#160;instead&#160;of&#160;merging&#160;two&#160;histories&#160;together&#160;with&#160;a&#160;big&#160;ugly&#160;reconciliation&#160;node,</text><text class="terminal-397674686-r2" x="1122.4" y="190.8" textLength="12.2" clip-path="url(#terminal-397674686-line-7)">
</text><text class="terminal-397674686-r2" x="0" y="215.2" textLength="1122.4" clip-path="url(#terminal-397674686-line-8)">it&#160;rewrites&#160;your&#160;branch&#160;as&#160;if&#160;you&#x27;d&#160;built&#160;it&#160;starting&#160;from&#160;that&#160;new&#160;point&#160;all&#160;along.&#160;This&#160;&#160;&#160;</text><text class="terminal-397674686-r2" x="1122.4" y="215.2" textLength="12.2" clip-path="url(#terminal-397674686-line-8)">
</text><text class="terminal-397674686-r2" x="0" y="239.6" textLength="1122.4" clip-path="url(#terminal-397674686-line-9)">gives&#160;you&#160;a&#160;clean,&#160;linear&#160;history&#160;—&#160;no&#160;merge&#160;commits&#160;cluttering&#160;the&#160;log&#160;like&#160;unnecessary&#160;&#160;&#160;&#160;</text><text class="terminal-397674686-r2" x="1122.4" y="239.6" textLength="12.2" clip-path="url(#terminal-397674686-line-9)">
</text><text class="terminal-397674686-r2" x="0" y="264" textLength="1122.4" clip-path="url(#terminal-397674686-line-10)">furniture&#160;in&#160;an&#160;otherwise&#160;minimalist&#160;Aviato-branded&#160;office.&#160;The&#160;tradeoff,&#160;and&#160;I&#160;say&#160;this&#160;&#160;&#160;&#160;</text><text class="terminal-397674686-r2" x="1122.4" y="264" textLength="12.2" clip-path="url(#terminal-397674686-line-10)">
</text><text class="terminal-397674686-r2" x="0" y="288.4" textLength="1012.6" clip-path="url(#terminal-397674686-line-11)">with&#160;the&#160;gravity&#160;of&#160;a&#160;man&#160;who&#160;has&#160;rewritten&#160;history&#160;before,&#160;is&#160;that&#160;rebase&#160;creates&#160;</text><text class="terminal-397674686-r5" x="1012.6" y="288.4" textLength="36.6" clip-path="url(#terminal-397674686-line-11)">new</text><text class="terminal-397674686-r2" x="1122.4" y="288.4" textLength="12.2" clip-path="url(#terminal-397674686-line-11)">
</text><text class="terminal-397674686-r2" x="0" y="312.8" textLength="1122.4" clip-path="url(#terminal-397674686-line-12)">commits&#160;with&#160;new&#160;hashes&#160;—&#160;so&#160;if&#160;you&#160;rebase&#160;anything&#160;that&#x27;s&#160;already&#160;been&#160;pushed&#160;and&#160;shared&#160;&#160;&#160;</text><text class="terminal-397674686-r2" x="1122.4" y="312.8" textLength="12.2" clip-path="url(#terminal-397674686-line-12)">
</text><text class="terminal-397674686-r2" x="0" y="337.2" textLength="1122.4" clip-path="url(#terminal-397674686-line-13)">with&#160;other&#160;people,&#160;you&#x27;re&#160;rewriting&#160;reality&#160;out&#160;from&#160;under&#160;them,&#160;which&#160;is&#160;the&#160;kind&#160;of&#160;move&#160;&#160;</text><text class="terminal-397674686-r2" x="1122.4" y="337.2" textLength="12.2" clip-path="url(#terminal-397674686-line-13)">
</text><text class="terminal-397674686-r2" x="0" y="361.6" textLength="1122.4" clip-path="url(#terminal-397674686-line-14)">that&#160;ends&#160;friendships&#160;and&#160;occasionally&#160;companies.&#160;Use&#160;it&#160;to&#160;keep&#160;your&#160;own&#160;local,&#160;unshared&#160;&#160;&#160;</text><text class="terminal-397674686-r2" x="1122.4" y="361.6" textLength="12.2" clip-path="url(#terminal-397674686-line-14)">
</text><text class="terminal-397674686-r2" x="0" y="386" textLength="1122.4" clip-path="url(#terminal-397674686-line-15)">work&#160;tidy&#160;before&#160;you&#160;share&#160;it;&#160;once&#160;it&#x27;s&#160;public,&#160;you&#160;merge&#160;like&#160;everyone&#160;else&#160;—&#160;even&#160;legends</text><text class="terminal-397674686-r2" x="1122.4" y="386" textLength="12.2" clip-path="url(#terminal-397674686-line-15)">
</text><text class="terminal-397674686-r2" x="0" y="410.4" textLength="1122.4" clip-path="url(#terminal-397674686-line-16)">have&#160;to&#160;color&#160;inside&#160;the&#160;lines&#160;sometimes.&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;</text><text class="terminal-397674686-r2" x="1122.4" y="410.4" textLength="12.2" clip-path="url(#terminal-397674686-line-16)">
</text>
